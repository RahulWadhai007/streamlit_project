version: "3.9"

services:
  recommender:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: research_recommender
    ports:
      - "8501:8501"
    volumes:
      # Persist CSV and model updates back to host
      - ./arxiv_data_210930-054931.csv:/app/arxiv_data_210930-054931.csv
      - ./models:/app/models
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
